name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Lint
        run: |
          if ! npm run lint; then
            echo ""
            echo "::error::ESLint check failed. Run locally to auto-fix:"
            echo "  npx eslint --fix src/"
            exit 1
          fi

      - name: Format check
        run: |
          if ! npm run format:check; then
            echo ""
            echo "::error::Prettier format check failed. Run locally to fix:"
            echo "  npx prettier --write ."
            exit 1
          fi

      - name: i18n check
        run: npm run i18n:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        run: |
          if ! cargo fmt --manifest-path src-tauri/Cargo.toml --check; then
            echo ""
            echo "::error::Rust format check failed. Run locally to fix:"
            echo "  cargo fmt --manifest-path src-tauri/Cargo.toml"
            exit 1
          fi

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
